<!DOCTYPE html>
<html>
    <head>
        <title>A real webpage</title>
    </head>
    <body>
        <h1>THE <font color="red">HTML</font> WEBPAGE</h1>
        <hr color="black">
        <h2>THE FORM</h2>
        <form>
            NAME: <input type="text" name="username" required><br><br>
            EMAIL: <input type="email" name="email" placeholder="abc@gmail.com" required><br><br>
            PASSWORD: <input type="password" name="pass" required ><br><br>
            STD:
            <input type="radio" name="std" value="10">10<sup>th</sup>
            <input type="radio" name="std" value="11">11<sup>th</sup>
            <input type="radio" name="std" value="12">12<sup>th</sup>
            <br><br>
            SUBJECTS: <br>
            <input type="checkbox" name="S1" value="IT">IT<br>
            <input type="checkbox" name="S2" value="SP">Secretarial Practice<br>
            <input type="checkbox" name="S3" value="MATHS">Maths<br>
            <input type="checkbox" name="S4" value="CS">Computer Science<br><br>
            CITY: <select name="city">
                <option value="Ulwe">
                    Ulwe
                </option>
                <option value="Nerul">
                    Nerul
                </option>
                <option value="Thane">
                    Thane
                </option>
                <option value="Panvel">
                    Panvel
                </option>
            </select><br><br>
            A Description About Yourself: <br> <textarea name="description"></textarea><br><br>
            <input type="submit" value="SUBmit the form">
        </form><br>
        <hr color="black">
        <h2>THE IMAGE WITH DESCRIPTION</h2>
    </body>
</html>
